<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车载座舱 AI 娱乐系统 - 实时预览</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 设计基准尺寸 2184 x 1133 */
            --design-width: 2184;
            --design-height: 1133;
            --design-ratio: calc(var(--design-width) / var(--design-height));
            
            /* 动态计算单位 - 基于视口短边 */
            --vw-unit: calc(100vw / var(--design-width));
            --vh-unit: calc(100vh / var(--design-height));
            --vmin-unit: min(var(--vw-unit), var(--vh-unit));
            --vmax-unit: max(var(--vw-unit), var(--vh-unit));
            
            /* 颜色系统 */
            --primary-bg: #0a0a0f;
            --secondary-bg: rgba(20, 20, 30, 0.6);
            --accent-cyan: #00d4ff;
            --accent-purple: #b829dd;
            --accent-pink: #ff006e;
            --accent-orange: #ff6b35;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glow-cyan: 0 0 calc(40 * var(--vmin-unit)) rgba(0, 212, 255, 0.4);
            --glow-purple: 0 0 calc(60 * var(--vmin-unit)) rgba(184, 41, 221, 0.3);
            
            /* 尺寸比例变量 */
            --space-xs: calc(4 * var(--vmin-unit));
            --space-sm: calc(8 * var(--vmin-unit));
            --space-md: calc(16 * var(--vmin-unit));
            --space-lg: calc(24 * var(--vmin-unit));
            --space-xl: calc(40 * var(--vmin-unit));
            --space-xxl: calc(60 * var(--vmin-unit));
            
            /* 圆角 */
            --radius-sm: calc(8 * var(--vmin-unit));
            --radius-md: calc(12 * var(--vmin-unit));
            --radius-lg: calc(16 * var(--vmin-unit));
            --radius-xl: calc(20 * var(--vmin-unit));
            --radius-xxl: calc(24 * var(--vmin-unit));
            
            /* 字号 */
            --text-xs: calc(10 * var(--vmin-unit));
            --text-sm: calc(12 * var(--vmin-unit));
            --text-base: calc(14 * var(--vmin-unit));
            --text-md: calc(16 * var(--vmin-unit));
            --text-lg: calc(20 * var(--vmin-unit));
            --text-xl: calc(28 * var(--vmin-unit));
            --text-2xl: calc(36 * var(--vmin-unit));
            --text-3xl: calc(48 * var(--vmin-unit));
            --text-4xl: calc(60 * var(--vmin-unit));
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--primary-bg);
            color: var(--text-primary);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* 动态背景层 */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        /* 弥散光效果 - 增强亮度与流动感 */
        .diffused-light {
            position: absolute;
            border-radius: 50%;
            filter: blur(calc(120 * var(--vmin-unit)));
            opacity: 0.6;
            mix-blend-mode: screen;
            animation: organic-float 12s ease-in-out infinite;
        }

        .light-1 {
            width: calc(800 * var(--vmin-unit));
            height: calc(800 * var(--vmin-unit));
            background: radial-gradient(circle, rgba(0, 212, 255, 0.9) 0%, rgba(0, 212, 255, 0.3) 40%, transparent 70%);
            top: calc(-200 * var(--vmin-unit));
            left: calc(-150 * var(--vmin-unit));
            animation-delay: 0s;
        }

        .light-2 {
            width: calc(700 * var(--vmin-unit));
            height: calc(700 * var(--vmin-unit));
            background: radial-gradient(circle, rgba(184, 41, 221, 0.9) 0%, rgba(184, 41, 221, 0.3) 40%, transparent 70%);
            bottom: calc(-150 * var(--vmin-unit));
            left: calc(-100 * var(--vmin-unit));
            animation-delay: -3s;
        }

        .light-3 {
            width: calc(600 * var(--vmin-unit));
            height: calc(600 * var(--vmin-unit));
            background: radial-gradient(circle, rgba(255, 0, 110, 0.85) 0%, rgba(255, 0, 110, 0.25) 40%, transparent 70%);
            top: 30%;
            left: 20%;
            animation-delay: -6s;
        }

        .light-4 {
            width: calc(750 * var(--vmin-unit));
            height: calc(750 * var(--vmin-unit));
            background: radial-gradient(circle, rgba(255, 107, 53, 0.9) 0%, rgba(255, 107, 53, 0.3) 40%, transparent 70%);
            bottom: calc(-100 * var(--vmin-unit));
            right: calc(-100 * var(--vmin-unit));
            animation-delay: -9s;
        }

        /* 有机流动动画 - 更复杂的运动轨迹 */
        @keyframes organic-float {
            0%, 100% { 
                transform: translate(0, 0) scale(1) rotate(0deg); 
                opacity: 0.5;
            }
            15% { 
                transform: translate(calc(80 * var(--vmin-unit)), calc(-40 * var(--vmin-unit))) scale(1.15) rotate(5deg); 
                opacity: 0.7;
            }
            30% { 
                transform: translate(calc(40 * var(--vmin-unit)), calc(60 * var(--vmin-unit))) scale(0.9) rotate(-3deg); 
                opacity: 0.55;
            }
            45% { 
                transform: translate(calc(-60 * var(--vmin-unit)), calc(20 * var(--vmin-unit))) scale(1.1) rotate(8deg); 
                opacity: 0.65;
            }
            60% { 
                transform: translate(calc(-40 * var(--vmin-unit)), calc(-80 * var(--vmin-unit))) scale(0.95) rotate(-5deg); 
                opacity: 0.5;
            }
            75% { 
                transform: translate(calc(60 * var(--vmin-unit)), calc(-20 * var(--vmin-unit))) scale(1.05) rotate(3deg); 
                opacity: 0.6;
            }
            90% { 
                transform: translate(calc(20 * var(--vmin-unit)), calc(40 * var(--vmin-unit))) scale(0.98) rotate(-2deg); 
                opacity: 0.55;
            }
        }

        /* ASCII艺术网格粒子效果 */
        .ascii-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .ascii-grid {
            display: grid;
            width: 100%;
            height: 100%;
            gap: 0;
        }

        .ascii-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
            transition: all 0.5s ease;
        }

        /* 主容器 - 固定比例 2184:1133 */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            padding: var(--space-xl);
            gap: var(--space-lg);
        }

        /* 左侧信息面板 - 32% 宽度 */
        .info-panel {
            width: 32%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: var(--space-md);
            flex-shrink: 0;
        }

        .glass-card {
            backdrop-filter: blur(calc(20 * var(--vmin-unit)));
            -webkit-backdrop-filter: blur(calc(20 * var(--vmin-unit)));
            padding: var(--space-lg);
            box-shadow: 0 calc(8 * var(--vmin-unit)) calc(32 * var(--vmin-unit)) rgba(0, 0, 0, 0.3);
        }

        /* 感知层 */
        .perception-layer {
            flex: 0 0 auto;
            align-self: flex-start;
            width: auto;
            min-width: 100%;
            max-width: calc(900 * var(--vmin-unit));
        }

        .perception-grid {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-sm);
        }

        .perception-chip {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(calc(10 * var(--vmin-unit)));
            border-radius: var(--radius-md);
            padding: var(--space-sm) var(--space-md);
            transition: all 0.3s ease;
            cursor: pointer;
            flex: 0 0 auto;
        }

        .perception-chip:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(calc(-2 * var(--vmin-unit)));
        }

        .perception-chip-icon {
            width: calc(36 * var(--vmin-unit));
            height: calc(36 * var(--vmin-unit));
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(184, 41, 221, 0.2));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(18 * var(--vmin-unit));
            flex-shrink: 0;
        }

        .perception-chip-content {
            display: flex;
            flex-direction: column;
            gap: calc(2 * var(--vmin-unit));
        }

        .perception-chip-label {
            font-size: var(--text-xs);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: calc(1 * var(--vmin-unit));
        }

        .perception-chip-value {
            font-size: calc(15 * var(--vmin-unit));
            color: var(--text-primary);
            font-weight: 500;
            white-space: nowrap;
        }

        /* 推理层 */
        .inference-layer {
            flex: 0 0 auto;
            align-self: flex-start;
            width: 100%;
            margin-top: auto;
        }

        .layer-header {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-md);
            padding-bottom: var(--space-md);
        }

        .layer-icon {
            width: calc(40 * var(--vmin-unit));
            height: calc(40 * var(--vmin-unit));
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(20 * var(--vmin-unit));
            box-shadow: var(--glow-cyan);
        }

        .layer-title {
            font-family: 'Orbitron', sans-serif;
            font-size: var(--text-base);
            font-weight: 700;
            letter-spacing: calc(2 * var(--vmin-unit));
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .inference-flow {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .inference-main {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.12), rgba(184, 41, 221, 0.12));
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            position: relative;
            overflow: hidden;
        }

        .inference-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            font-size: calc(13 * var(--vmin-unit));
        }

        .inference-cause {
            color: var(--accent-cyan);
            font-weight: 500;
        }

        .arrow-icon {
            color: var(--text-muted);
            font-size: calc(16 * var(--vmin-unit));
        }

        .inference-result {
            color: var(--accent-purple);
            font-weight: 700;
            font-size: calc(16 * var(--vmin-unit));
        }

        .inference-sub {
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            margin-left: var(--space-md);
        }

        .sub-label {
            font-size: var(--text-xs);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: calc(1 * var(--vmin-unit));
            margin-bottom: var(--space-sm);
        }

        .sub-content {
            font-size: calc(13 * var(--vmin-unit));
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* 右侧生成层 - 占据剩余空间 */
        .generation-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: var(--space-xl) var(--space-xxl);
            padding-right: var(--space-lg);
            padding-bottom: 0;
            min-width: 0;
        }

        /* 歌曲信息 - 页面右上 */
        .song-info-header {
            position: absolute;
            top: var(--space-xl);
            right: var(--space-xxl);
            text-align: right;
            z-index: 100;
            backdrop-filter: blur(calc(20 * var(--vmin-unit)));
            -webkit-backdrop-filter: blur(calc(20 * var(--vmin-unit)));
            padding: var(--space-md) var(--space-lg);
        }

        .song-title {
            font-size: var(--text-xl);
            font-weight: 700;
            margin-bottom: var(--space-sm);
            letter-spacing: calc(2 * var(--vmin-unit));
            text-shadow: 0 calc(2 * var(--vmin-unit)) calc(20 * var(--vmin-unit)) rgba(0, 0, 0, 0.5);
            color: var(--text-primary);
        }

        .song-artist {
            font-size: var(--text-md);
            color: var(--text-secondary);
            letter-spacing: calc(1 * var(--vmin-unit));
        }

        /* 歌词展示 */
        .lyrics-fullscreen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding: calc(100 * var(--vmin-unit)) var(--space-lg) var(--space-sm) var(--space-lg);
            width: 100%;
            margin-left: auto;
            overflow: hidden;
            position: relative;
        }

        .lyrics-container {
            text-align: right;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lyrics-line {
            font-size: var(--text-2xl);
            font-weight: 300;
            line-height: 1.6;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: calc(2 * var(--vmin-unit));
            padding: var(--space-sm) 0;
            height: calc(58 * var(--vmin-unit));
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .lyrics-line.prev {
            color: var(--text-muted);
            font-size: calc(28 * var(--vmin-unit));
            opacity: 0.35;
            transform: translateX(calc(-20 * var(--vmin-unit)));
        }

        .lyrics-line.prev-2 {
            color: var(--text-muted);
            font-size: calc(24 * var(--vmin-unit));
            opacity: 0.2;
            transform: translateX(calc(-30 * var(--vmin-unit)));
        }

        .lyrics-line.prev-3 {
            color: var(--text-muted);
            font-size: calc(20 * var(--vmin-unit));
            opacity: 0.1;
            transform: translateX(calc(-40 * var(--vmin-unit)));
        }

        .lyrics-line.current {
            color: var(--text-primary);
            font-size: var(--text-4xl);
            font-weight: 600;
            text-shadow: 
                0 0 calc(40 * var(--vmin-unit)) rgba(255, 255, 255, 0.3),
                0 0 calc(80 * var(--vmin-unit)) rgba(0, 212, 255, 0.15);
            background: linear-gradient(90deg, var(--accent-cyan), var(--text-primary), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transform: translateX(0);
            letter-spacing: calc(4 * var(--vmin-unit));
            height: calc(96 * var(--vmin-unit));
            position: relative;
            z-index: 10;
        }

        .lyrics-line.current::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--text-primary), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(calc(20 * var(--vmin-unit)));
            opacity: 0.5;
            z-index: -1;
        }

        .lyrics-line.next {
            color: var(--text-secondary);
            font-size: calc(28 * var(--vmin-unit));
            opacity: 0.55;
            transform: translateX(calc(-10 * var(--vmin-unit)));
        }

        .lyrics-line.next-2 {
            color: var(--text-secondary);
            font-size: calc(24 * var(--vmin-unit));
            opacity: 0.35;
            transform: translateX(calc(-20 * var(--vmin-unit)));
        }

        .lyrics-line.next-3 {
            color: var(--text-secondary);
            font-size: calc(20 * var(--vmin-unit));
            opacity: 0.2;
            transform: translateX(calc(-30 * var(--vmin-unit)));
        }

        /* 歌曲预览区域 */
        .song-preview {
            display: flex;
            gap: var(--space-md);
            justify-content: flex-end;
            align-self: flex-end;
            margin-top: auto;
            margin-left: auto;
            padding: 0 var(--space-lg) var(--space-sm) 0;
        }

        .preview-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(calc(20 * var(--vmin-unit)));
            -webkit-backdrop-filter: blur(calc(20 * var(--vmin-unit)));
            border: calc(1 * var(--vmin-unit)) solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: var(--space-md) var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            min-width: calc(260 * var(--vmin-unit));
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .preview-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(calc(-4 * var(--vmin-unit)));
        }

        .preview-card.prev-song {
            opacity: 0.6;
        }

        .preview-card.next-song {
            opacity: 0.8;
        }

        .preview-icon {
            width: calc(44 * var(--vmin-unit));
            height: calc(44 * var(--vmin-unit));
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(18 * var(--vmin-unit));
        }

        .preview-info {
            flex: 1;
        }

        .preview-label {
            font-size: var(--text-xs);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: calc(1 * var(--vmin-unit));
            margin-bottom: calc(4 * var(--vmin-unit));
        }

        .preview-title {
            font-size: var(--text-base);
            font-weight: 500;
            margin-bottom: calc(2 * var(--vmin-unit));
        }

        .preview-artist {
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }

        /* 响应式适配 - 小屏幕 */
        @media (max-aspect-ratio: 16/9) {
            :root {
                --vmin-unit: calc(100vw / var(--design-width));
            }
            
            .main-container {
                padding: calc(24 * var(--vmin-unit));
                gap: calc(16 * var(--vmin-unit));
            }
            
            .info-panel {
                width: 35%;
            }
            
            .generation-panel {
                padding: calc(24 * var(--vmin-unit)) calc(32 * var(--vmin-unit));
            }
        }

        /* 超小屏幕适配 */
        @media (max-aspect-ratio: 4/3) {
            .info-panel {
                width: 38%;
            }
            
            .perception-grid {
                gap: calc(8 * var(--vmin-unit));
            }
            
            .perception-chip {
                padding: calc(8 * var(--vmin-unit)) calc(12 * var(--vmin-unit));
            }
            
            .lyrics-fullscreen {
                padding-top: calc(80 * var(--vmin-unit));
            }
        }
    </style>
</head>
<body>
    <!-- 动态背景层 -->
    <div class="background-layer">
        <div class="diffused-light light-1"></div>
        <div class="diffused-light light-2"></div>
        <div class="diffused-light light-3"></div>
        <div class="diffused-light light-4"></div>
        <div class="ascii-particles" id="ascii-particles">
            <div class="ascii-grid" id="ascii-grid"></div>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧信息面板 - 32% -->
        <div class="info-panel">
            <!-- 感知层 -->
            <div class="glass-card perception-layer">
                <div class="layer-header">
                    <div class="layer-icon">👁</div>
                    <div class="layer-title">感知层 Layer 1</div>
                </div>
                
                <div class="perception-grid">
                    <div class="perception-chip">
                        <div class="perception-chip-icon">🎥</div>
                        <div class="perception-chip-content">
                            <div class="perception-chip-label">视觉</div>
                            <div class="perception-chip-value">红衣服、低头</div>
                        </div>
                    </div>
                    
                    <div class="perception-chip">
                        <div class="perception-chip-icon">😔</div>
                        <div class="perception-chip-content">
                            <div class="perception-chip-label">情绪</div>
                            <div class="perception-chip-value">不开心 87%</div>
                        </div>
                    </div>
                    
                    <div class="perception-chip">
                        <div class="perception-chip-icon">🌧</div>
                        <div class="perception-chip-content">
                            <div class="perception-chip-label">环境</div>
                            <div class="perception-chip-value">雨天、傍晚</div>
                        </div>
                    </div>
                    
                    <div class="perception-chip">
                        <div class="perception-chip-icon">🚗</div>
                        <div class="perception-chip-content">
                            <div class="perception-chip-label">车辆</div>
                            <div class="perception-chip-value">行驶 45km/h</div>
                        </div>
                    </div>
                    
                    <div class="perception-chip">
                        <div class="perception-chip-icon">🎵</div>
                        <div class="perception-chip-content">
                            <div class="perception-chip-label">音频</div>
                            <div class="perception-chip-value">轻音乐播放中</div>
                        </div>
                    </div>
                    
                    <div class="perception-chip">
                        <div class="perception-chip-icon">👤</div>
                        <div class="perception-chip-content">
                            <div class="perception-chip-label">乘客</div>
                            <div class="perception-chip-value">1人 副驾</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 推理层 -->
            <div class="glass-card inference-layer">
                <div class="layer-header">
                    <div class="layer-icon">🧠</div>
                    <div class="layer-title">推理层 Layer 2</div>
                </div>
                
                <div class="inference-flow">
                    <div class="inference-main">
                        <div class="inference-arrow">
                            <span class="inference-cause">情绪低落</span>
                            <span class="arrow-icon">→</span>
                            <span class="inference-result">忧郁歌单</span>
                        </div>
                    </div>
                    
                    <div class="inference-sub">
                        <div class="sub-label">辅助推理</div>
                        <div class="sub-content">
                            雨天环境 + 傍晚时段 → 增强舒缓氛围<br>
                            行驶状态 → 保持节奏稳定
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧生成层 - 68% -->
        <div class="generation-panel">
            <!-- 歌曲信息 - 页面右上 -->
            <div class="song-info-header">
                <div class="song-title">夜雨寄北</div>
                <div class="song-artist">林宥嘉 · 忧郁蓝调</div>
            </div>

            <div class="lyrics-fullscreen">
                <!-- 歌词展示 - 右对齐，8行 -->
                <div class="lyrics-container">
                    <div class="lyrics-line prev-3">窗外的雨下了一整夜</div>
                    <div class="lyrics-line prev-2">我在车里听着老唱片</div>
                    <div class="lyrics-line prev">那些回不去的时光啊</div>
                    <div class="lyrics-line current" data-text="像你的温柔在耳边回响">像你的温柔在耳边回响</div>
                    <div class="lyrics-line next">这城市的灯火太匆忙</div>
                    <div class="lyrics-line next-2">谁还记得当初的模样</div>
                    <div class="lyrics-line next-3">就让回忆随风飘荡</div>
                    <div class="lyrics-line">在雨夜里静静流淌</div>
                </div>
            </div>

            <!-- 歌曲预览 - 底部 -->
            <div class="song-preview">
                <div class="preview-card prev-song">
                    <div class="preview-icon">⏮</div>
                    <div class="preview-info">
                        <div class="preview-label">上一首</div>
                        <div class="preview-title">演员</div>
                        <div class="preview-artist">薛之谦</div>
                    </div>
                </div>
                
                <div class="preview-card next-song">
                    <div class="preview-icon">⏭</div>
                    <div class="preview-info">
                        <div class="preview-label">下一首</div>
                        <div class="preview-title">成全</div>
                        <div class="preview-artist">刘若英</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ASCII艺术网格粒子系统
        const asciiGrid = document.getElementById('ascii-grid');
        const particleChar = '×';
        
        // 获取CSS变量计算值
        function getVminUnit() {
            const designWidth = 2184;
            const designHeight = 1133;
            const vw = window.innerWidth / designWidth;
            const vh = window.innerHeight / designHeight;
            return Math.min(vw, vh);
        }
        
        // 弥散光源位置（相对坐标 0-1）- 四个光源，增强流动感
        const lightSources = [
            { x: 0.15, y: 0.15, color: '#00d4ff', radius: 0.4, speed: 1.2 },
            { x: 0.15, y: 0.85, color: '#b829dd', radius: 0.38, speed: 1.0 },
            { x: 0.35, y: 0.5, color: '#ff006e', radius: 0.35, speed: 1.5 },
            { x: 0.85, y: 0.85, color: '#ff6b35', radius: 0.42, speed: 0.9 }
        ];
        
        let gridCells = [];
        const cols = 80;
        const rows = 50;
        let time = 0;
        let animationId = null;
        let lastUpdateTime = 0;
        const updateInterval = 100;
        
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 100, g: 100, b: 100 };
        }
        
        function getDistanceToLight(x, y, light) {
            const dx = x - light.x;
            const dy = y - light.y;
            return Math.sqrt(dx * dx + dy * dy);
        }
        
        function getCellStyle(col, row) {
            const x = col / cols;
            const y = row / rows;
            
            let totalWeight = 0;
            let r = 20, g = 20, b = 30;
            let weightedSize = 12;
            let weightedOpacity = 0.15;
            
            lightSources.forEach(light => {
                const distance = getDistanceToLight(x, y, light);
                const weight = Math.exp(-distance * distance / (light.radius * light.radius * 0.5));
                totalWeight += weight;
                
                const color = hexToRgb(light.color);
                r += color.r * weight;
                g += color.g * weight;
                b += color.b * weight;
                
                weightedSize += weight * 12;
                weightedOpacity += weight * 0.6;
            });
            
            if (totalWeight > 0) {
                r = r / (1 + totalWeight * 0.3);
                g = g / (1 + totalWeight * 0.3);
                b = b / (1 + totalWeight * 0.3);
            }
            
            const vminUnit = getVminUnit();
            const size = Math.min(32 * vminUnit, Math.max(16 * vminUnit, weightedSize / (1 + totalWeight * 0.15)));
            const opacity = Math.min(1.0, Math.max(0.2, weightedOpacity / (1 + totalWeight * 0.1)));
            
            r = Math.min(255, Math.max(20, r));
            g = Math.min(255, Math.max(20, g));
            b = Math.min(255, Math.max(30, b));
            
            return {
                color: `rgba(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)}, ${opacity})`,
                fontSize: `${size}px`,
                char: particleChar,
                influence: totalWeight
            };
        }
        
        function initAsciiGrid() {
            asciiGrid.innerHTML = '';
            gridCells = [];
            
            asciiGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            asciiGrid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'ascii-cell';
                    
                    const style = getCellStyle(col, row);
                    cell.textContent = particleChar;
                    cell.style.color = style.color;
                    cell.style.fontSize = style.fontSize;
                    
                    asciiGrid.appendChild(cell);
                    gridCells.push({
                        element: cell,
                        col: col,
                        row: row,
                        baseStyle: style
                    });
                }
            }
        }
        
        function animateAsciiGrid(currentTime) {
            animationId = requestAnimationFrame(animateAsciiGrid);
            
            if (currentTime - lastUpdateTime < updateInterval) {
                return;
            }
            lastUpdateTime = currentTime;
            
            time += 0.032;
            
            // 有机流动 - 多层正弦波叠加
            lightSources[0].x = 0.15 + Math.sin(time * 0.8) * 0.04 + Math.sin(time * 0.3) * 0.02;
            lightSources[0].y = 0.15 + Math.cos(time * 0.6) * 0.03 + Math.cos(time * 0.2) * 0.015;
            
            lightSources[1].x = 0.15 + Math.sin(time * 0.5 + 2) * 0.035 + Math.sin(time * 0.25) * 0.02;
            lightSources[1].y = 0.85 + Math.cos(time * 0.7) * 0.04 + Math.cos(time * 0.35) * 0.015;
            
            lightSources[2].x = 0.35 + Math.sin(time * 1.0 + 1) * 0.03 + Math.sin(time * 0.4) * 0.015;
            lightSources[2].y = 0.5 + Math.cos(time * 0.8) * 0.025 + Math.cos(time * 0.3) * 0.02;
            
            lightSources[3].x = 0.85 + Math.sin(time * 0.6 + 4) * 0.045 + Math.sin(time * 0.2) * 0.025;
            lightSources[3].y = 0.85 + Math.cos(time * 0.9) * 0.035 + Math.cos(time * 0.4) * 0.02;
            
            gridCells.forEach((cell) => {
                const style = getCellStyle(cell.col, cell.row);
                
                if (cell.element.style.color !== style.color) {
                    cell.element.style.color = style.color;
                }
                if (cell.element.style.fontSize !== style.fontSize) {
                    cell.element.style.fontSize = style.fontSize;
                }
            });
        }
        
        initAsciiGrid();
        animateAsciiGrid(0);
        
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
            } else {
                if (!animationId) {
                    animateAsciiGrid(0);
                }
            }
        });
        
        window.addEventListener('resize', () => {
            initAsciiGrid();
        });

        // 歌词动态效果
        const lyricsLines = document.querySelectorAll('.lyrics-line');
        const lyricsContainer = document.querySelector('.lyrics-container');
        let currentLine = 3;
        
        function getLineHeight() {
            const vminUnit = getVminUnit();
            return 58 * vminUnit;
        }
        
        function getCurrentLineHeight() {
            const vminUnit = getVminUnit();
            return 96 * vminUnit;
        }
        
        function getContainerHeight() {
            const vminUnit = getVminUnit();
            return 464 * vminUnit;
        }
        
        function updateLyrics() {
            const lineHeight = getLineHeight();
            const currentLineHeight = getCurrentLineHeight();
            const containerHeight = getContainerHeight();
            
            let offset = 0;
            for (let i = 0; i < currentLine; i++) {
                offset += (i === currentLine - 1) ? currentLineHeight : lineHeight;
            }
            const centerOffset = offset - (containerHeight / 2) + (currentLineHeight / 2);
            
            lyricsContainer.style.transform = `translateY(${-centerOffset}px)`;
            
            lyricsLines.forEach((line, index) => {
                line.className = 'lyrics-line';
                const diff = index - currentLine;
                
                if (diff === 0) {
                    line.classList.add('current');
                    line.setAttribute('data-text', line.textContent);
                } else if (diff === -1) {
                    line.classList.add('prev');
                } else if (diff === -2) {
                    line.classList.add('prev-2');
                } else if (diff <= -3) {
                    line.classList.add('prev-3');
                } else if (diff === 1) {
                    line.classList.add('next');
                } else if (diff === 2) {
                    line.classList.add('next-2');
                } else if (diff >= 3) {
                    line.classList.add('next-3');
                }
            });
        }
        
        let lyricsStartTime = performance.now();
        const lyricsInterval = 4000;
        
        function lyricsLoop(currentTime) {
            if (currentTime - lyricsStartTime >= lyricsInterval) {
                currentLine = (currentLine + 1) % lyricsLines.length;
                updateLyrics();
                lyricsStartTime = currentTime;
            }
            requestAnimationFrame(lyricsLoop);
        }
        
        updateLyrics();
        requestAnimationFrame(lyricsLoop);
    </script>
</body>
</html>
